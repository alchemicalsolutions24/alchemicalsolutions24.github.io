<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>9 to Zen App</title>
    <style>
        body { 
            font-family: sans-serif; 
            text-align: center; 
            padding: 50px 20px; 
            background-color: #f9f9f9; 
            margin: 0;
        }
        
        .download-buttons { 
            margin: 40px 0; 
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .store-badge {
            display: inline-block;
            transition: transform 0.2s ease, opacity 0.2s ease;
        }

        .store-badge:hover {
            transform: scale(1.03);
            opacity: 0.9;
        }

        .store-badge img {
            height: 50px; /* Aligns both badges cleanly to a matching uniform height */
            width: auto;
            display: block;
        }
        
        footer { margin-top: 100px; font-size: 0.9em; }
        footer a { color: #666; text-decoration: none; }
        footer a:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <h1>9 to Zen</h1>
    <p>Find your balance. Download our app below.</p>

    <div class="download-buttons">
        <!-- Replace the '#' with your actual App Store and Google Play Store URLs -->
        <a href="#" class="store-badge" target="_blank" aria-label="Download on the Apple App Store">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/3/3c/Download_on_the_App_Store_Badge.svg/1280px-Download_on_the_App_Store_Badge.svg.png" alt="Download on the App Store">
        </a>
        
        <a href="#" class="store-badge" target="_blank" aria-label="Get it on Google Play">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/7/78/Google_Play_Store_badge_EN.svg/1280px-Google_Play_Store_badge_EN.svg.png" alt="Get it on Google Play">
        </a>
    </div>

    <footer>
        <p><a href="legal/">Legal & Privacy</a></p>
    </footer>

</body>
</html>
