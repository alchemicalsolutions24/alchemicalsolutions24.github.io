<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>9 to Zen™</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

body{

    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;

    min-height:100vh;

    overflow-x:hidden;

    display:flex;
    justify-content:center;
    align-items:center;

    color:#f7e8bb;

    background:
    radial-gradient(circle at top,#2b1d06 0%,#090909 35%,#000000 100%);
}

/************************************************/
/* Animated Background                          */
/************************************************/

.background{

    position:fixed;
    inset:0;
    overflow:hidden;
    z-index:-10;

}

.background::before{

    content:"";

    position:absolute;
    inset:0;

    background:

    radial-gradient(circle at 20% 15%,rgba(255,210,100,.12),transparent 30%),
    radial-gradient(circle at 80% 75%,rgba(255,180,70,.10),transparent 30%),
    radial-gradient(circle at center,rgba(255,220,130,.04),transparent 60%);

}

/************************************************/
/* Golden Orbs                                  */
/************************************************/

.orb{

    position:absolute;

    border-radius:50%;

    background:

    radial-gradient(circle,
    rgba(255,236,180,.95) 0%,
    rgba(255,208,110,.65) 25%,
    rgba(208,152,40,.25) 55%,
    rgba(255,215,0,0) 75%);

    filter:blur(6px);

    animation:float 22s ease-in-out infinite;

}

.orb:nth-child(1){

    width:360px;
    height:360px;

    top:-120px;
    left:-120px;

}

.orb:nth-child(2){

    width:220px;
    height:220px;

    top:15%;
    right:8%;

    animation-delay:5s;

}

.orb:nth-child(3){

    width:430px;
    height:430px;

    bottom:-180px;
    left:30%;

    animation-delay:10s;

}

.orb:nth-child(4){

    width:180px;
    height:180px;

    bottom:18%;
    right:-50px;

    animation-delay:3s;

}

.orb:nth-child(5){

    width:260px;
    height:260px;

    left:75%;
    top:-80px;

    animation-delay:8s;

}

@keyframes float{

0%,100%{

transform:translateY(0px) translateX(0px);

}

50%{

transform:translateY(-35px) translateX(30px);

}

}

/************************************************/
/* Main Card                                    */
/************************************************/

.container{

    width:min(900px,92vw);

    padding:70px 50px;

    border-radius:34px;

    background:

    rgba(18,18,18,.58);

    backdrop-filter:blur(18px);

    border:1px solid rgba(255,215,120,.16);

    box-shadow:

    0 0 70px rgba(255,190,70,.08),
    inset 0 0 30px rgba(255,255,255,.02);

    text-align:center;

}

/************************************************/
/* Typography                                   */
/************************************************/

.logo{

    font-size:4rem;

    font-weight:300;

    letter-spacing:8px;

    color:#f5df9b;

    margin-bottom:18px;

    text-shadow:

    0 0 25px rgba(255,220,120,.18);

}

.tagline{

    color:#d6c89b;

    font-size:1.2rem;

    line-height:1.8;

    max-width:650px;

    margin:0 auto 55px auto;

}

/************************************************/
/* Download Buttons                             */
/************************************************/

.download-buttons{

    display:flex;

    justify-content:center;

    align-items:center;

    flex-wrap:wrap;

    gap:24px;

    margin-bottom:60px;

}

.store-badge{

    transition:

    transform .35s ease,

    filter .35s ease;

}

.store-badge:hover{

    transform:

    translateY(-5px)
    scale(1.03);

    filter:

    drop-shadow(0 0 20px rgba(255,205,90,.35));

}

.store-badge img{

    height:58px;

    width:auto;

}

/************************************************/
/* Divider                                      */
/************************************************/

.divider{

    width:90px;

    height:1px;

    margin:45px auto;

    background:

    linear-gradient(to right,
    transparent,
    #d4a84a,
    transparent);

}

/************************************************/
/* Footer                                       */
/************************************************/

footer{

    color:#bfa96a;

    font-size:.95rem;

}

footer a{

    color:#e2c873;

    text-decoration:none;

    transition:.3s;

}

footer a:hover{

    color:white;

}

/************************************************/
/* Mobile                                       */
/************************************************/

@media(max-width:768px){

.logo{

font-size:2.8rem;

letter-spacing:5px;

}

.container{

padding:45px 25px;

}

.tagline{

font-size:1.05rem;

}

.store-badge img{

height:52px;

}

}

</style>

</head>

<body>

<div class="background">

<div class="orb"></div>
<div class="orb"></div>
<div class="orb"></div>
<div class="orb"></div>
<div class="orb"></div>

</div>

<div class="container">

<h1 class="logo">9 to Zen™</h1>

<p class="tagline">
Transform everyday moments into mindful experiences.
Find your balance, cultivate focus, and embrace calm wherever life takes you.
</p>

<div class="download-buttons">

<a href="#"
class="store-badge"
target="_blank"
aria-label="Download on the Apple App Store">

<img
src="https://upload.wikimedia.org/wikipedia/commons/thumb/3/3c/Download_on_the_App_Store_Badge.svg/1280px-Download_on_the_App_Store_Badge.svg.png"
alt="Download on the App Store">

</a>

<a href="#"
class="store-badge"
target="_blank"
aria-label="Get it on Google Play">

<img
src="https://upload.wikimedia.org/wikipedia/commons/thumb/7/78/Google_Play_Store_badge_EN.svg/1280px-Google_Play_Store_badge_EN.svg.png"
alt="Get it on Google Play">

</a>

</div>

<div class="divider"></div>

<footer>

<a href="legal/">Legal &amp; Privacy</a>

</footer>

</div>

</body>
</html>
