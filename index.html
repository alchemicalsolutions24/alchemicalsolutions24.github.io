<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alchemical Solutions</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: "Segoe UI", Arial, sans-serif;
            background: linear-gradient(to bottom, #f8faf9, #eef5f2);
            color: #2d2d2d;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            width: 90%;
            text-align: center;
            background: white;
            padding: 60px 40px;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.08);
        }

        h1 {
            color: #2c6e49;
            font-size: 3rem;
            margin-bottom: 15px;
        }

        p {
            font-size: 1.2rem;
            line-height: 1.7;
            margin-bottom: 40px;
            color: #555;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .button {
            display: block;
            text-decoration: none;
            background: #2c6e49;
            color: white;
            padding: 18px;
            border-radius: 10px;
            font-size: 1.2rem;
            font-weight: 600;
            transition: background 0.25s ease;
        }

        .button:hover {
            background: #24593b;
        }

        footer {
            margin-top: 50px;
            color: #888;
            font-size: 0.9rem;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>Welcome to Alchemical Solutions</h1>

    <p>
        Explore our collection of interactive experiences designed to inspire
        mindfulness, creativity, and discovery.
    </p>

    <div class="links">

        <a class="button" href="./9%F0%9F%92%AB%20to%20Zen/">
            9💫 to Zen
        </a>

        <a class="button" href="./apothecaryofspirits/">
            Apothecary of Spirits
        </a>

    </div>

    <footer>
        © 2026 Alchemical Solutions
    </footer>

</div>

</body>
</html>
